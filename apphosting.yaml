# Firebase App Hosting 런타임/빌드 설정
# 공식 문서: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0
  maxInstances: 1
  cpu: 1
  memoryMiB: 512
  concurrency: 80

# 환경변수 -- NEXT_PUBLIC_* 는 클라이언트 번들에 포함되는 공개 값
# (Firebase 보안은 Auth 도메인 제한 + Firestore/Storage 규칙으로 방어)
env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyB9HAzNbG3akaQ-UuHQiYxbafWYmkZF4vw
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: chakchak-926ac.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: chakchak-926ac
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: chakchak-926ac.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "1034333784658"
