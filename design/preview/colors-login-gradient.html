<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--chak-font-sans)}
  .card{padding:20px}
  .grad{height:140px;border-radius:16px;background:linear-gradient(135deg,#a8c8f8 0%,#7b9fe8 30%,#8b7fd4 60%,#b8d4f8 100%);position:relative;overflow:hidden}
  .blob{position:absolute;border-radius:50%;filter:blur(40px)}
  .b1{width:140px;height:140px;top:-20px;left:10%;background:rgba(180,200,255,.6)}
  .b2{width:120px;height:120px;bottom:-20px;right:8%;background:rgba(150,130,220,.6)}
  .stops{display:flex;gap:6px;margin-top:10px;font-size:10px;color:#666;font-family:ui-monospace,Menlo,monospace}
  .stops span{flex:1;text-align:center;padding:4px 0;border-radius:4px;color:#fff;font-weight:600}
</style></head><body><div class="card">
  <div class="grad"><div class="blob b1"></div><div class="blob b2"></div></div>
  <div class="stops">
    <span style="background:#a8c8f8">#a8c8f8</span>
    <span style="background:#7b9fe8">#7b9fe8</span>
    <span style="background:#8b7fd4">#8b7fd4</span>
    <span style="background:#b8d4f8">#b8d4f8</span>
  </div>
  <div style="margin-top:8px;font-size:11px;color:#666">login only · 135deg · two blurred blobs on top</div>
</div></body></html>
