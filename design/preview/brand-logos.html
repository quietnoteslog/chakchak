<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--chak-font-sans)}
  .card{padding:22px;display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .tile{width:96px;height:96px;border-radius:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(100,120,200,.25)}
  .tile.a{background:#7b9fe8}
  .tile.b{background:linear-gradient(135deg,#a8c8f8,#7b9fe8 50%,#8b7fd4)}
  .name{font-size:13px;font-weight:800;color:#222;letter-spacing:.06em}
  .sub{font-size:11px;color:#666;margin-top:2px}
  .w{display:flex;flex-direction:column;align-items:center;gap:6px}
</style></head><body><div class="card">
  <div class="w">
    <div class="tile a">
      <span style="font-family:'Pretendard';font-weight:900;font-size:44px;color:#fff;letter-spacing:-2px">착착</span>
    </div>
    <div class="name">원본 아이콘</div>
    <div class="sub">production</div>
  </div>
  <div class="w">
    <div class="tile b">
      <span style="font-family:'Pretendard';font-weight:900;font-size:44px;color:#fff;letter-spacing:-2px">착착</span>
    </div>
    <div class="name">그라디언트</div>
    <div class="sub">proposal</div>
  </div>
  <div class="w" style="align-items:flex-start">
    <img src="../assets/logo-horizontal.svg" style="height:72px">
    <div class="name">가로형 + 태그라인</div>
    <div class="sub">행사 경비 정산을 착착</div>
  </div>
</div></body></html>
