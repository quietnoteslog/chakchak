<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#f5f7fb;font-family:var(--chak-font-sans)}
  .card{padding:24px}
  .row{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-end}
  .box{width:150px;background:#fff;border-radius:12px;border:1px solid #e5e9f2;height:80px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#555;font-weight:600}
  .lbl{font-size:10px;color:#666;font-family:ui-monospace,Menlo,monospace;text-align:center;margin-top:6px}
</style></head><body><div class="card">
<div class="row">
  <div><div class="box">no shadow</div><div class="lbl">card · default</div></div>
  <div><div class="box" style="box-shadow:0 2px 12px rgba(0,0,0,.12)">btn</div><div class="lbl">Google btn · 0 2 12 .12</div></div>
  <div><div class="box" style="box-shadow:0 8px 32px rgba(100,120,200,.2)">glass</div><div class="lbl">login glass · 0 8 32</div></div>
  <div><div class="box" style="box-shadow:0 10px 40px rgba(0,0,0,.2)">modal</div><div class="lbl">modal · 0 10 40 .2</div></div>
</div>
</div></body></html>
