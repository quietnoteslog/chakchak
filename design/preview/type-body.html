<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">

  .meta{font-size:10px;color:#888;font-family:ui-monospace,Menlo,monospace;min-width:160px}
</style></head><body><div class="card">
  <div class="row"><div style="font:var(--chak-body)">현장에서 영수증을 촬영하면 AI가 자동으로 금액을 추출합니다</div><div class="meta">body · 400 14/1.5</div></div>
