<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--chak-font-sans);color:var(--chak-fg-1)}
  .card{padding:20px;box-sizing:border-box}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .sw{width:120px;border-radius:10px;overflow:hidden;border:1px solid var(--chak-border);font-size:11px}
  .sw .chip{height:52px}
  .sw .meta{padding:6px 8px;background:#fff}
  .sw .name{font-weight:700;color:#222;font-size:11px}
  .sw .hex{color:#888;font-family:ui-monospace,Menlo,monospace;font-size:10px;margin-top:1px}
</style></head><body><div class="card">
<div class="row">
  <div class="sw"><div class="chip" style="background:#7b9fe8"></div><div class="meta"><div class="name">primary</div><div class="hex">#7b9fe8</div></div></div>
  <div class="sw"><div class="chip" style="background:#4a6bc4"></div><div class="meta"><div class="name">primary-dark</div><div class="hex">#4a6bc4</div></div></div>
  <div class="sw"><div class="chip" style="background:#eef4ff"></div><div class="meta"><div class="name">primary-tint</div><div class="hex">#eef4ff</div></div></div>
  <div class="sw"><div class="chip" style="background:#e8efff"></div><div class="meta"><div class="name">primary-tint-2</div><div class="hex">#e8efff</div></div></div>
  <div class="sw"><div class="chip" style="background:#b5c4e8"></div><div class="meta"><div class="name">primary-disabled</div><div class="hex">#b5c4e8</div></div></div>
</div>
</div></body></html>
