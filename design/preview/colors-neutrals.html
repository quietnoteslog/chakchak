<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--chak-font-sans)}
  .card{padding:20px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .sw{width:118px;border-radius:10px;overflow:hidden;border:1px solid var(--chak-border);font-size:11px}
  .sw .chip{height:52px}
  .sw .meta{padding:6px 8px}
  .sw .name{font-weight:700;color:#222;font-size:11px}
  .sw .hex{color:#888;font-family:ui-monospace,Menlo,monospace;font-size:10px;margin-top:1px}
</style></head><body><div class="card">
<div class="row">
  <div class="sw"><div class="chip" style="background:#f5f7fb"></div><div class="meta"><div class="name">bg</div><div class="hex">#f5f7fb</div></div></div>
  <div class="sw"><div class="chip" style="background:#ffffff;border-bottom:1px solid #e5e9f2"></div><div class="meta"><div class="name">surface</div><div class="hex">#ffffff</div></div></div>
  <div class="sw"><div class="chip" style="background:#f0f2f8"></div><div class="meta"><div class="name">surface-muted</div><div class="hex">#f0f2f8</div></div></div>
  <div class="sw"><div class="chip" style="background:#e5e9f2"></div><div class="meta"><div class="name">border</div><div class="hex">#e5e9f2</div></div></div>
  <div class="sw"><div class="chip" style="background:#d0d6e2"></div><div class="meta"><div class="name">border-strong</div><div class="hex">#d0d6e2</div></div></div>
  <div class="sw"><div class="chip" style="background:#c5cfe4"></div><div class="meta"><div class="name">border-dashed</div><div class="hex">#c5cfe4</div></div></div>
</div>
</div></body></html>
