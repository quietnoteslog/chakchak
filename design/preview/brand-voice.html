<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--chak-font-sans);color:#333}
  .card{padding:20px;display:grid;gap:10px;font-size:14px}
  .r{display:flex;align-items:center;gap:12px;padding:8px 10px;border-radius:8px}
  .tag{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#888;min-width:60px}
  .ex{font-weight:500}
</style></head><body><div class="card">
  <div class="r" style="background:#f5f7fb"><span class="tag">ok</span><span class="ex">"영수증 촬영·선택·드래그 (선택)"</span></div>
  <div class="r" style="background:#f5f7fb"><span class="tag">ok</span><span class="ex">"아직 프로젝트가 없습니다"</span></div>
  <div class="r" style="background:#f5f7fb"><span class="tag">ok</span><span class="ex">"+ 새 프로젝트로 시작하세요"</span></div>
  <div class="r" style="background:#f5f7fb"><span class="tag">ok</span><span class="ex">"저장 실패 — 다시 시도해주세요"</span></div>
  <div class="r" style="background:#fff5f5"><span class="tag" style="color:#c33">no</span><span class="ex" style="color:#a44;text-decoration:line-through">"멋진 영수증을 여기에 업로드하세요! ✨"</span></div>
  <div class="r" style="background:#fff5f5"><span class="tag" style="color:#c33">no</span><span class="ex" style="color:#a44;text-decoration:line-through">"Upload your receipts here"</span></div>
</div></body></html>
