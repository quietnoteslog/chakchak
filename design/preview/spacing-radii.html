<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--chak-font-sans)}
  .card{padding:20px}
  .row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
  .r{display:flex;flex-direction:column;align-items:center;gap:6px}
  .b{background:#7b9fe8;width:96px}
  .lbl{font-size:11px;color:#666;font-family:ui-monospace,Menlo,monospace}
  .name{font-size:11px;font-weight:700;color:#222}
</style></head><body><div class="card">
<div class="row">
  <div class="r"><div class="b" style="height:96px;border-radius:4px"></div><div class="name">xs</div><div class="lbl">4px</div></div>
  <div class="r"><div class="b" style="height:96px;border-radius:6px"></div><div class="name">sm</div><div class="lbl">6px</div></div>
  <div class="r"><div class="b" style="height:96px;border-radius:8px"></div><div class="name">md</div><div class="lbl">8px</div></div>
  <div class="r"><div class="b" style="height:96px;border-radius:10px"></div><div class="name">lg</div><div class="lbl">10px</div></div>
  <div class="r"><div class="b" style="height:96px;border-radius:12px"></div><div class="name">xl</div><div class="lbl">12px</div></div>
  <div class="r"><div class="b" style="height:96px;border-radius:16px"></div><div class="name">3xl</div><div class="lbl">16px</div></div>
  <div class="r"><div class="b" style="height:96px;border-radius:24px"></div><div class="name">24</div><div class="lbl">24px</div></div>
  <div class="r"><div class="b" style="height:48px;width:120px;border-radius:50px"></div><div class="name">pill</div><div class="lbl">50px</div></div>
</div>
</div></body></html>
