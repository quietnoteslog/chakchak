<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--chak-font-sans)}
  .card{padding:20px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .sw{width:118px;border-radius:10px;overflow:hidden;border:1px solid var(--chak-border);font-size:11px}
  .sw .chip{height:52px}
  .sw .meta{padding:6px 8px}
  .sw .name{font-weight:700;color:#222;font-size:11px}
  .sw .hex{color:#888;font-family:ui-monospace,Menlo,monospace;font-size:10px;margin-top:1px}
</style></head><body><div class="card">
<div class="row">
  <div class="sw"><div class="chip" style="background:#cc3333"></div><div class="meta"><div class="name">danger</div><div class="hex">#c33</div></div></div>
  <div class="sw"><div class="chip" style="background:#f0c8c8"></div><div class="meta"><div class="name">danger-border</div><div class="hex">#f0c8c8</div></div></div>
  <div class="sw"><div class="chip" style="background:#3a8e5f"></div><div class="meta"><div class="name">success</div><div class="hex">#3a8e5f</div></div></div>
  <div class="sw"><div class="chip" style="background:#2e7d32"></div><div class="meta"><div class="name">success-strong</div><div class="hex">#2e7d32</div></div></div>
  <div class="sw"><div class="chip" style="background:#e8f5e9"></div><div class="meta"><div class="name">success-tint</div><div class="hex">#e8f5e9</div></div></div>
  <div class="sw"><div class="chip" style="background:#c6e7c9"></div><div class="meta"><div class="name">success-border</div><div class="hex">#c6e7c9</div></div></div>
</div>
</div></body></html>
