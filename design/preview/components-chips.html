<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#f5f7fb;font-family:var(--chak-font-sans);color:#333}
  .card{padding:20px;display:flex;flex-direction:column;gap:10px}
  .row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .tab{padding:8px 14px;font-size:13px;font-weight:600;border:1px solid #d0d6e2;background:#fff;color:#555;border-radius:8px;cursor:pointer}
  .tab.active{background:#7b9fe8;color:#fff;border-color:#7b9fe8}
  .chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#eef4ff;color:#4a6bc4;border-radius:14px;font-size:12px;font-weight:600}
  .chip .x{background:transparent;border:none;color:#4a6bc4;cursor:pointer;font-size:14px;line-height:1;padding:0}
  .badge-owner{font-size:10px;padding:3px 10px;background:#e8efff;color:#4a6bc4;border-radius:10px;font-weight:600}
  .badge-edit{font-size:10px;padding:3px 10px;background:#e8f5e9;color:#2e7d32;border-radius:10px;font-weight:600}
  .tag{font-size:10px;padding:2px 6px;background:#f0f2f8;color:#555;border-radius:4px;font-weight:600}
</style></head><body><div class="card">
  <div class="row">
    <span class="tab active">전체 (12)</span>
    <span class="tab">사전 업무 (4)</span>
    <span class="tab">행사 당일 (6)</span>
    <span class="tab">정산 (2)</span>
  </div>
  <div class="row">
    <span class="chip">식비 <button class="x">×</button></span>
    <span class="chip">교통비 <button class="x">×</button></span>
    <span class="chip">비품 <button class="x">×</button></span>
    <span class="chip">신한 ****0912 <button class="x">×</button></span>
  </div>
  <div class="row">
    <span class="badge-owner">총괄</span>
    <span class="badge-edit">편집 권한</span>
    <span class="tag">영수증</span>
    <span class="tag">세금계산서</span>
  </div>
</div></body></html>
