<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--chak-font-sans);color:#333;font-size:12px}
  .card{padding:10px;background:#fff;border:1px solid #e5e9f2;border-radius:8px;margin:14px;overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:600px}
  th{background:#f5f7fb;color:#555;padding:10px;font-size:11px;font-weight:700;text-align:left;white-space:nowrap}
  td{padding:10px;font-size:12px;border-top:1px solid #eef1f7}
  td.amt{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
  .tag{font-size:10px;padding:2px 6px;background:#f0f2f8;color:#555;border-radius:4px;font-weight:600}
  .muted{color:#666}
  .strong{font-weight:600}
  .link{color:#7b9fe8;font-size:11px;text-decoration:none}
  .warn{color:#c33;font-size:11px}
</style></head><body>
<div class="card"><table>
  <thead><tr>
    <th>#</th><th>일자</th><th>구분</th><th>구매처</th><th>내용</th><th style="text-align:right">금액</th><th>영수증</th>
  </tr></thead>
  <tbody>
    <tr><td class="muted" style="text-align:center">1</td><td style="white-space:nowrap">2026.04.21</td><td><span class="tag">영수증</span></td><td class="strong">이마트 강남점</td><td class="muted">간식·음료</td><td class="amt">124,500</td><td><a class="link">보기</a></td></tr>
    <tr><td class="muted" style="text-align:center">2</td><td style="white-space:nowrap">2026.04.22</td><td><span class="tag">세금계산서</span></td><td class="strong">현대렌터카</td><td class="muted">15인승</td><td class="amt">380,000</td><td><a class="link">보기</a></td></tr>
    <tr><td class="muted" style="text-align:center">3</td><td style="white-space:nowrap">2026.04.23</td><td><span class="tag">간이영수증</span></td><td class="strong">편의점</td><td class="muted">생수</td><td class="amt">12,400</td><td><span class="warn">미제출</span></td></tr>
  </tbody>
</table></div>
</body></html>
