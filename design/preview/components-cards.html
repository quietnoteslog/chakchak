<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#f5f7fb;font-family:var(--chak-font-sans);color:#333}
  .wrap{padding:16px;display:grid;gap:10px}
  .card{padding:16px;background:#fff;border-radius:12px;border:1px solid #e5e9f2}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .name{font-size:16px;font-weight:700;color:#222}
  .meta{font-size:12px;color:#888}
  .badge-owner{font-size:10px;padding:2px 8px;background:#e8efff;color:#4a6bc4;border-radius:10px;font-weight:600}
  .summary{padding:16px;background:#fff;border-radius:12px;border:1px solid #e5e9f2;display:flex;justify-content:space-between;align-items:center}
  .label{font-size:12px;color:#888;margin-bottom:2px}
  .amt{font-size:20px;font-weight:700}
  .cta{padding:10px 16px;background:#7b9fe8;color:#fff;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none}
  .empty{padding:24px;background:#fff;border:1px dashed #d0d6e2;border-radius:12px;text-align:center;color:#888;font-size:13px}
</style></head><body><div class="wrap">
  <div class="card">
    <div class="top"><div class="name">2026 상반기 워크샵</div><span class="badge-owner">총괄</span></div>
    <div class="meta">2026.04.21 ~ 2026.05.20 · 멤버 4명</div>
  </div>
  <div class="summary">
    <div><div class="label">전체 지출</div><div class="amt">1,234,500원</div></div>
    <a class="cta" href="#">+ 내역 추가</a>
  </div>
  <div class="empty">아직 내역이 없습니다. 영수증을 추가해보세요.</div>
</div></body></html>
