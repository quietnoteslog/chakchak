<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>착착 · Mobile UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #eef1f6; font-family: var(--chak-font-sans); min-height: 100vh; }
  .page { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 24px; }
  .title { text-align: center; margin-bottom: 4px; }
  .title h1 { font: 700 22px/1.3 var(--chak-font-sans); margin: 0; color: #222; letter-spacing: .05em; }
  .title p { font-size: 13px; color: #666; margin: 4px 0 0; }
  .nav { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 520px; }
  .nav button {
    padding: 7px 12px; font-size: 12px; font-weight: 600; border-radius: 20px;
    border: 1px solid #d0d6e2; background: #fff; color: #555; cursor: pointer; font-family: inherit;
  }
  .nav button.active { background: #7b9fe8; color: #fff; border-color: #7b9fe8; }
  #root { display: flex; justify-content: center; }
</style>
</head>
<body>
<div class="page">
  <div class="title">
    <h1>착착 · Mobile UI Kit</h1>
    <p>iPhone 프레임 안에서 주요 플로우를 탐색해보세요</p>
  </div>
  <div id="nav" class="nav"></div>
  <div id="root"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../assets/icons.js"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="LoginScreen.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="NewProject.jsx"></script>
<script type="text/babel" src="ProjectDetail.jsx"></script>
<script type="text/babel" src="NewRecord.jsx"></script>
<script type="text/babel" src="Members.jsx"></script>

<script type="text/babel" data-presets="react">
const SAMPLE_PROJECTS = [
  { id: 'p1', name: '2026 상반기 워크샵', dates: '2026.05.01 ~ 2026.05.20', members: 4, owner: true },
  { id: 'p2', name: 'Q1 브랜드 리뉴얼', dates: '2026.01.15 ~ 2026.03.30', members: 6, owner: false },
  { id: 'p3', name: '제주 오프사이트', dates: '2026.06.10 ~ 2026.06.13', members: 8, owner: true },
];

const SAMPLE_PROJECT = {
  id: 'p1',
  name: '2026 상반기 워크샵',
  dates: '2026.05.01 ~ 2026.05.20',
  members: 4,
  categories: ['사전 업무', '행사 당일', '정산'],
  memberList: [
    { name: '신유림', role: 'owner' },
    { name: '김도현', role: 'editor' },
    { name: '박지수', role: 'member' },
    { name: '이승재', role: 'member' },
  ],
};

const SAMPLE_RECORDS = [
  { id: 'r1', date: '2026.05.02', type: '영수증', cat: '사전 업무', merchant: '이마트 강남점', content: '간식·음료', amount: 124500, receipt: true },
  { id: 'r2', date: '2026.05.03', type: '세금계산서', cat: '사전 업무', merchant: '현대렌터카', content: '15인승', amount: 380000, receipt: true },
  { id: 'r3', date: '2026.05.04', type: '간이영수증', cat: '행사 당일', merchant: '편의점', content: '생수', amount: 12400, receipt: false },
  { id: 'r4', date: '2026.05.05', type: '영수증', cat: '행사 당일', merchant: '더파크레스토랑', content: '저녁 식사', amount: 456000, receipt: true },
  { id: 'r5', date: '2026.05.06', type: '영수증', cat: '행사 당일', merchant: '스타벅스', content: '회의 음료', amount: 28400, receipt: true },
  { id: 'r6', date: '2026.05.15', type: '세금계산서', cat: '정산', merchant: '디자인 스튜디오 하루', content: '보고서 제작', amount: 850000, receipt: true },
];

const SCREENS = [
  { id: 'login', label: '로그인' },
  { id: 'dashboard', label: '대시보드' },
  { id: 'new-project', label: '프로젝트 생성' },
  { id: 'project', label: '프로젝트 상세' },
  { id: 'new-record', label: '내역 추가' },
  { id: 'members', label: '멤버 관리' },
  { id: 'empty', label: '빈 대시보드' },
];

function App() {
  const [screen, setScreen] = React.useState(() => localStorage.getItem('chak:screen') || 'login');
  React.useEffect(() => { localStorage.setItem('chak:screen', screen); }, [screen]);

  const go = (s) => setScreen(s);

  const content = (() => {
    switch (screen) {
      case 'login': return <LoginScreen onSignIn={() => go('dashboard')} />;
      case 'dashboard': return <Dashboard projects={SAMPLE_PROJECTS} userName="신유림" onOpen={() => go('project')} onNew={() => go('new-project')} onLogout={() => go('login')} />;
      case 'empty': return <Dashboard projects={[]} userName="신유림" onOpen={() => go('project')} onNew={() => go('new-project')} onLogout={() => go('login')} />;
      case 'new-project': return <NewProject onBack={() => go('dashboard')} onCreate={() => go('project')} />;
      case 'project': return <ProjectDetail project={SAMPLE_PROJECT} records={SAMPLE_RECORDS} onBack={() => go('dashboard')} onAdd={() => go('new-record')} onMembers={() => go('members')} />;
      case 'new-record': return <NewRecord project={SAMPLE_PROJECT} onBack={() => go('project')} onSave={() => go('project')} />;
      case 'members': return <Members project={SAMPLE_PROJECT} onBack={() => go('project')} />;
      default: return null;
    }
  })();

  // Render nav
  React.useEffect(() => {
    const nav = document.getElementById('nav');
    nav.innerHTML = '';
    SCREENS.forEach(s => {
      const b = document.createElement('button');
      b.textContent = s.label;
      b.className = s.id === screen ? 'active' : '';
      b.onclick = () => setScreen(s.id);
      nav.appendChild(b);
    });
  }, [screen]);

  return (
    <IOSDevice width={390} height={780} dark={false}>
      <div style={{ position: 'absolute', inset: 0, paddingTop: 44, boxSizing: 'border-box' }}>
        <div style={{ height: '100%', overflow: 'hidden' }}>{content}</div>
      </div>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
